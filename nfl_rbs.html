<style>
:root{--bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.22);--tx:#efefef;--mu:#5a5a5a;--mu2:#888;--ac:#e8764a;--ac2:#c45530;--red:#e85a4a;--green:#4acd8d;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;}
.app{min-height:100vh;}
.hdr{padding:16px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--ac);}
.hdr-back{font-size:11px;color:var(--mu);text-decoration:none;opacity:.7;}
.hdr-back:hover{opacity:1;color:var(--tx);}
.main{max-width:560px;margin:0 auto;width:100%;padding:28px 20px 48px;}
.screen{display:none;flex-direction:column;}.screen.active{display:flex;flex-direction:column;justify-content:flex-start;}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:.95;letter-spacing:3px;margin-bottom:10px;}
.h-title em{color:var(--ac);font-style:normal;}
.h-desc{font-size:13px;color:var(--mu2);line-height:1.75;margin-bottom:10px;max-width:400px;}
.h-meta{font-size:12px;color:var(--mu);margin-bottom:28px;}.h-meta span{color:var(--ac);}
.q-lbl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--ac);margin-bottom:2px;}
.pbar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;margin-bottom:16px;}
.pfill{height:100%;background:var(--ac);border-radius:1px;transition:width .22s;}
.q-hint{font-size:12px;color:var(--mu2);margin-bottom:16px;min-height:30px;line-height:1.55;}
.vs{display:flex;gap:8px;margin-bottom:10px;}
.vc{flex:1;background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:22px 14px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s,transform .1s;}
.vc:hover{border-color:var(--ac);background:var(--s2);}.vc:active{transform:scale(.97);}
.vc-emoji{font-size:30px;margin-bottom:6px;line-height:1.2;}
.vc-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;color:var(--tx);margin-bottom:3px;}
.vc-detail{font-size:11px;color:var(--mu);}
.vs-sep{display:flex;align-items:center;justify-content:center;width:24px;flex-shrink:0;font-size:11px;color:var(--mu);font-weight:500;}
.btn-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.cmp-btn{background:var(--s2);border:1px solid var(--b2);color:var(--mu2);border-radius:6px;padding:5px 11px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--ac);margin-bottom:4px;}
.res-meta{font-size:12px;color:var(--mu);margin-bottom:20px;}
.r-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--b1);}.r-row:last-child{border-bottom:none;}
.r-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--mu);min-width:34px;text-align:right;line-height:1;}.r-num.gold{color:var(--ac);}
.r-emoji{font-size:20px;min-width:28px;text-align:center;}.r-name{font-size:14px;color:var(--tx);flex:1;}.r-detail{font-size:11px;color:var(--mu);}
.btn{padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}.btn-p{background:var(--ac);color:#000;}.btn-g{background:transparent;color:var(--mu2);border:1px solid var(--b2);}.btn-sm{padding:7px 14px;font-size:11px;}.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.save-btn{background:var(--s2);border:1px solid var(--b2);color:var(--ac);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.save-name-row{display:flex;gap:8px;margin-bottom:10px;}
.save-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;}
.save-input:focus{border-color:var(--ac);}.save-input::placeholder{color:var(--mu);}
.saved-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:16px;}.saved-modal-bg.open{display:flex;}
.saved-modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:500px;max-height:88vh;display:flex;flex-direction:column;}
.saved-modal-hdr{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.saved-modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--ac);}
.saved-modal-close{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1;}
.saved-modal-body{overflow-y:auto;padding:14px 18px;flex:1;}
.saved-entry{border:1px solid var(--b1);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.saved-entry-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--s2);}
.saved-entry-name{font-size:13px;font-weight:500;color:var(--tx);}.saved-entry-date{font-size:11px;color:var(--mu);}
.saved-entry-del{background:none;border:none;color:var(--mu);font-size:16px;cursor:pointer;padding:2px 6px;}
.saved-entry-list{padding:10px 14px;}
.saved-item-row{display:flex;gap:8px;align-items:center;padding:4px 0;font-size:12px;border-bottom:.5px solid var(--b1);}.saved-item-row:last-child{border-bottom:none;}
.saved-item-num{font-family:'Bebas Neue',sans-serif;font-size:16px;min-width:24px;text-align:right;color:var(--mu);}.saved-item-num.g{color:var(--ac);}
.saved-item-name{flex:1;color:var(--tx);}.no-saves{color:var(--mu);font-size:13px;text-align:center;padding:24px 0;}
.man-list{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.man-item{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;cursor:grab;user-select:none;touch-action:none;}
.man-item:active{cursor:grabbing;}
.man-item.dragging{opacity:.4;border-style:dashed;}
.man-item.drag-over{border-color:var(--ac);background:var(--s2);}
.man-rank{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--mu);min-width:24px;text-align:right;line-height:1;}
.man-rank.gold{color:var(--ac);}
.man-emoji{font-size:17px;min-width:22px;text-align:center;}
.man-name{font-size:12px;color:var(--tx);flex:1;}
.man-handle{font-size:13px;color:var(--mu);padding:0 2px;opacity:.4;}
</style>
</head>

  <div class="man-list" id="man-list"></div>

    <input class="save-input" id="man-save-input" placeholder="Name this ranking&#8230;" maxlength="40">

</div>
<script>
var ITEMS=[
  {n:'Saquon Barkley',e:'🦅',d:'Philadelphia Eagles'},
  {n:'Derrick Henry',e:'🦅',d:'Baltimore Ravens'},
  {n:'Christian McCaffrey',e:'🏈',d:'San Francisco 49ers'},
  {n:'Kenneth Walker III',e:'🏹',d:'Kansas City Chiefs'},
  {n:'De\'Von Achane',e:'🐬',d:'Miami Dolphins'},
  {n:'Bijan Robinson',e:'🦅',d:'Atlanta Falcons'},
  {n:'Breece Hall',e:'🟢',d:'New York Jets'},
  {n:'Jahmyr Gibbs',e:'🦁',d:'Detroit Lions'},
  {n:'Josh Jacobs',e:'🧀',d:'Green Bay Packers'},
  {n:'Kyren Williams',e:'🐰',d:'Los Angeles Rams'},
  {n:'James Cook',e:'🦬',d:'Buffalo Bills'},
  {n:'JK Dobbins',e:'🐴',d:'Denver Broncos'},
  {n:'Jonathan Taylor',e:'🐴',d:'Indianapolis Colts'},
  {n:'Rico Dowdle',e:'🔪',d:'Pittsburgh Steelers'},
  {n:'Travis Etienne',e:'🌙',d:'New Orleans Saints'},
  {n:'Aaron Jones',e:'🦅',d:'Minnesota Vikings'},
  {n:'Tony Pollard',e:'🐯',d:'Tennessee Titans'},
  {n:'Rhamondre Stevenson',e:'🦅',d:'New England Patriots'},
  {n:'TreVeyon Henderson',e:'🦅',d:'New England Patriots'},
  {n:'David Montgomery',e:'🐂',d:'Houston Texans'},
  {n:'Woody Marks',e:'🐂',d:'Houston Texans'},
  {n:'Jordan Mason',e:'🏈',d:'San Francisco 49ers'},
  {n:'Ashton Jeanty',e:'🗡',d:'Las Vegas Raiders'},
  {n:'Tyler Allgeier',e:'🔱',d:'Arizona Cardinals'},
  {n:'Cam Skattebo',e:'🗽',d:'New York Giants'},
  {n:'Quinshon Judkins',e:'🐶',d:'Cleveland Browns'},
  {n:'Bhayshul Tuten',e:'🐆',d:'Jacksonville Jaguars'},
  {n:'RJ Harvey',e:'🐴',d:'Denver Broncos'},
  {n:'Alvin Kamara',e:'🌙',d:'New Orleans Saints'},
  {n:'Jacory Croskey-Merritt',e:'🐺',d:'Washington Commanders'},
  {n:'Javonte Williams',e:'⭐',d:'Dallas Cowboys'},
  {n:'Zach Charbonnet',e:'🦅',d:'Seattle Seahawks'},
  {n:'Chuba Hubbard',e:'🐈',d:'Carolina Panthers'},
  {n:'D\'Andre Swift',e:'🐻',d:'Chicago Bears'},
  {n:'Kyle Monangai',e:'🐻',d:'Chicago Bears'},
  {n:'Chase Brown',e:'🐯',d:'Cincinnati Bengals'},
  {n:'Omarion Hampton',e:'⚡',d:'Los Angeles Chargers'},
  {n:'Bucky Irving',e:'🏴',d:'Tampa Bay Buccaneers'}
];
var RANKER_KEY="nfl_rbs";
var sorted=[],queue=[],current=-1,lo=0,hi=0,qNum=0,moveHistory=[];
function mxQ(n){var t=0;for(var i=2;i<=n;i++)t+=Math.ceil(Math.log2(i));return t;}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}}
function show(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById(id).classList.add("active");window.scrollTo(0,0);}
function startQuiz(){
  var ix=ITEMS.map(function(_,i){return i;});shuf(ix);
  sorted=[ix[0]];queue=ix.slice(1);current=-1;qNum=0;moveHistory=[];
  document.getElementById("undo-btn").style.display="none";
  show("s-quiz");nextInsertion();
}
function nextInsertion(){
  if(queue.length===0){showResults(true);return;}
  current=queue.shift();lo=0;hi=sorted.length;ask();
}
function ask(){
  if(lo>=hi){sorted.splice(lo,0,current);nextInsertion();return;}
  var mid=Math.floor((lo+hi)/2),piv=sorted[mid];
  var ins=ITEMS[current],pv=ITEMS[piv];
  document.getElementById("vea").textContent=ins.e;
  document.getElementById("vna").textContent=ins.n;
  document.getElementById("vda").textContent=ins.d;
  document.getElementById("veb").textContent=pv.e;
  document.getElementById("vnb").textContent=pv.n;
  document.getElementById("vdb").textContent=pv.d;
  qNum++;
  var pct=Math.min(97,Math.round((qNum/mxQ(ITEMS.length))*100));
  document.getElementById("qhint").textContent="Who is the better RB right now? "+queue.length+" still to place.";
  document.getElementById("qpf").style.width=pct+"%";
}
function pick(ch){
  moveHistory.push({sorted:sorted.slice(),queue:queue.slice(),current:current,lo:lo,hi:hi,qNum:qNum});
  document.getElementById("undo-btn").style.display="";
  var mid=Math.floor((lo+hi)/2);
  if(ch==="hi")hi=mid;else lo=mid+1;
  ask();
}
function undoPick(){
  if(moveHistory.length===0)return;
  var h=moveHistory.pop();
  sorted=h.sorted;queue=h.queue;current=h.current;lo=h.lo;hi=h.hi;qNum=h.qNum;
  if(moveHistory.length===0)document.getElementById("undo-btn").style.display="none";
  show("s-quiz");ask();
}
function showPartial(){
  var partial=sorted.slice();if(current>=0)partial.push(current);queue.forEach(function(q){partial.push(q);});
  buildResults(partial,false);
  document.getElementById("continue-btn").style.display="";
  show("s-res");
}
function continueQuiz(){
  document.getElementById("continue-btn").style.display="none";
  show("s-quiz");ask();
}
function showResults(complete){
  buildResults(sorted,complete);
  if(!complete)document.getElementById("continue-btn").style.display="";
  show("s-res");
}
function buildResults(list,complete){
  document.getElementById("res-meta").textContent=complete?(list.length+" ranked."):("Partial - "+queue.length+" still to place.");
  var el=document.getElementById("res-list");el.innerHTML="";
  list.forEach(function(idx,rank){
    var item=ITEMS[idx];var row=document.createElement("div");row.className="r-row";
    var nc=rank<10?"r-num gold":"r-num";
    row.innerHTML="<div class=\""+nc+"\">"+(rank+1)+"</div><div class=\"r-emoji\">"+item.e+"</div><div class=\"r-name\">"+item.n+"</div><div class=\"r-detail\">"+item.d+"</div>";
    el.appendChild(row);
  });
}
function getSaves(){try{return JSON.parse(localStorage.getItem("tg_saves_"+RANKER_KEY)||"[]");}catch(e){return[];}}
function putSaves(arr){localStorage.setItem("tg_saves_"+RANKER_KEY,JSON.stringify(arr));}
function saveRanking(){
  var name=document.getElementById("save-name-input").value.trim()||new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  var rows=document.querySelectorAll("#res-list .r-row");
  var items=[];
  rows.forEach(function(row){
    var nameEl=row.querySelector(".r-name");var numEl=row.querySelector(".r-num");var emojiEl=row.querySelector(".r-emoji");
    if(nameEl&&numEl)items.push({rank:parseInt(numEl.textContent)||0,name:nameEl.textContent.trim(),emoji:emojiEl?emojiEl.textContent.trim():""});
  });
  if(items.length===0)return;
  var saves=getSaves();
  saves.unshift({id:Date.now(),name:name,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),items:items});
  putSaves(saves);
  document.getElementById("save-name-input").value="";
  var btn=document.getElementById("save-ranking-btn");
  btn.textContent="Saved!";btn.style.color="var(--green)";
  setTimeout(function(){btn.textContent="Save Ranking";btn.style.color="";},1800);
}
function openSavedModal(){renderSavedModal();document.getElementById("saved-modal-bg").classList.add("open");}
function closeSavedModal(){document.getElementById("saved-modal-bg").classList.remove("open");}
document.getElementById("saved-modal-bg").addEventListener("click",function(e){if(e.target===e.currentTarget)closeSavedModal();});
function deleteSave(id){putSaves(getSaves().filter(function(s){return s.id!==id;}));renderSavedModal();}
function renderSavedModal(){
  var saves=getSaves();var body=document.getElementById("saved-modal-body");
  if(saves.length===0){body.innerHTML="<div class=\"no-saves\">No saved rankings yet.</div>";return;}
  var html2="";
  saves.forEach(function(s){
    html2+="<div class=\"saved-entry\"><div class=\"saved-entry-hdr\"><div><div class=\"saved-entry-name\">"+s.name+"</div><div class=\"saved-entry-date\">"+s.date+"</div></div><button class=\"saved-entry-del\" onclick=\"deleteSave("+s.id+")\">&#215;</button></div><div class=\"saved-entry-list\">";
    s.items.forEach(function(item){
      html2+="<div class=\"saved-item-row\"><div class=\"saved-item-num"+(item.rank<=10?" g":"")+"\">"+ item.rank+"</div>"+(item.emoji?"<span style=\"font-size:15px\">"+item.emoji+"</span>":"")+"<div class=\"saved-item-name\">"+item.name+"</div></div>";
    });
    html2+="</div></div>";
  });
  body.innerHTML=html2;
}

var manOrder=[];
var dragSrc=null;

function startManual(){
  var ix=ITEMS.map(function(_,i){return i;});
  manOrder=ix;
  renderManual();
  show("s-manual");
}

function renderManual(){
  var el=document.getElementById("man-list");
  el.innerHTML="";
  manOrder.forEach(function(idx,rank){
    var item=ITEMS[idx];
    var row=document.createElement("div");
    row.className="man-item";
    row.draggable=true;
    row.dataset.idx=idx;
    var rankCls=rank<10?"man-rank gold":"man-rank";
    row.innerHTML='<div class="man-handle">&#8801;</div><div class="'+rankCls+'">'+(rank+1)+'</div><div class="man-emoji">'+item.e+'</div><div class="man-name">'+item.n+'</div>';
    // Desktop drag
    row.addEventListener("dragstart",function(){dragSrc=this;this.classList.add("dragging");});
    row.addEventListener("dragend",function(){this.classList.remove("dragging");document.querySelectorAll(".man-item").forEach(function(r){r.classList.remove("drag-over");});});
    row.addEventListener("dragover",function(e){e.preventDefault();this.classList.add("drag-over");});
    row.addEventListener("dragleave",function(){this.classList.remove("drag-over");});
    row.addEventListener("drop",function(e){
      e.preventDefault();this.classList.remove("drag-over");
      if(dragSrc===this)return;
      var fromIdx=manOrder.indexOf(parseInt(dragSrc.dataset.idx));
      var toIdx=manOrder.indexOf(parseInt(this.dataset.idx));
      manOrder.splice(toIdx,0,manOrder.splice(fromIdx,1)[0]);
      renderManual();
    });
    // Touch drag
    row.addEventListener("touchstart",function(e){dragSrc=this;this.classList.add("dragging");},{ passive:true });
    row.addEventListener("touchmove",function(e){
      e.preventDefault();
      var touch=e.touches[0];
      var target=document.elementFromPoint(touch.clientX,touch.clientY);
      if(target){
        var item=target.closest(".man-item");
        if(item&&item!==dragSrc){
          document.querySelectorAll(".man-item").forEach(function(r){r.classList.remove("drag-over");});
          item.classList.add("drag-over");
        }
      }
    },{ passive:false });
    row.addEventListener("touchend",function(e){
      this.classList.remove("dragging");
      var over=document.querySelector(".man-item.drag-over");
      if(over&&over!==dragSrc){
        var fromIdx=manOrder.indexOf(parseInt(dragSrc.dataset.idx));
        var toIdx=manOrder.indexOf(parseInt(over.dataset.idx));
        manOrder.splice(toIdx,0,manOrder.splice(fromIdx,1)[0]);
        over.classList.remove("drag-over");
        renderManual();
      }
      document.querySelectorAll(".man-item").forEach(function(r){r.classList.remove("drag-over");});
    });
    el.appendChild(row);
  });
}

function saveManual(){
  var name=document.getElementById("man-save-input").value.trim()||
    new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  var items=manOrder.map(function(idx,rank){
    return {rank:rank+1,name:ITEMS[idx].n,emoji:ITEMS[idx].e};
  });
  var saves=getSaves();
  saves.unshift({id:Date.now(),name:name,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),items:items});
  putSaves(saves);
  document.getElementById("man-save-input").value="";
  var btn=document.getElementById("man-save-btn");
  btn.textContent="Saved!";btn.style.color="var(--green)";
  setTimeout(function(){btn.textContent="Save Ranking";btn.style.color="";},1800);
}
</script>
