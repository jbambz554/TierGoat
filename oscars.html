<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TierGoat — Oscar's Best Picture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.22);
  --tx:#efefef;--mu:#5a5a5a;--mu2:#888;--ac:#d4a843;--ac2:#d4a843;--red:#e85a4a;--green:#4acd8d;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;}
.app{min-height:100vh;display:flex;flex-direction:column;}
.hdr{padding:16px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:14px;}
.logo-wrap{display:flex;align-items:center;gap:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--ac);}
.hdr-back{font-size:11px;color:var(--mu);text-decoration:none;letter-spacing:.04em;opacity:.7;}
.hdr-back:hover{opacity:1;color:var(--tx);}
.main{flex:1;max-width:560px;margin:0 auto;width:100%;padding:28px 20px 48px;}
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}

/* HOME */
.h-title{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:.95;letter-spacing:3px;margin-bottom:10px;}
.h-title em{color:var(--ac);font-style:normal;}
.h-desc{font-size:13px;color:var(--mu2);line-height:1.75;margin-bottom:10px;max-width:400px;}
.h-meta{font-size:12px;color:var(--mu);margin-bottom:28px;}
.h-meta span{color:var(--ac);}

/* QUIZ */
.q-lbl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--ac);margin-bottom:2px;}
.q-prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-bottom:6px;}
.pbar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;margin-bottom:16px;}
.pfill{height:100%;background:var(--ac);border-radius:1px;transition:width .22s;}
.q-hint{font-size:12px;color:var(--mu2);margin-bottom:16px;min-height:30px;line-height:1.55;}
.vs{display:flex;gap:8px;margin-bottom:10px;}
.vc{flex:1;background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s,transform .1s;position:relative;overflow:hidden;}
.vc::after{content:'';position:absolute;inset:0;background:var(--ac);opacity:0;transition:opacity .12s;}
.vc:hover{border-color:var(--ac);background:var(--s2);}
.vc:hover::after{opacity:.04;}
.vc:active{transform:scale(.97);}
.vc-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--tx);margin-bottom:3px;position:relative;}
.vc-detail{font-size:11px;color:var(--mu);position:relative;line-height:1.4;}
.vs-sep{display:flex;align-items:center;justify-content:center;width:24px;flex-shrink:0;font-size:11px;color:var(--mu);font-weight:500;}
.btn-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.cmp-btn{background:var(--s2);border:1px solid var(--b2);color:var(--mu2);border-radius:6px;padding:5px 11px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:color .12s,border-color .12s;}
.cmp-btn:hover{color:var(--tx);border-color:var(--b3);}

/* RESULTS */
.res-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--ac);margin-bottom:4px;}
.res-meta{font-size:12px;color:var(--mu);margin-bottom:20px;}
.r-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:.5px solid var(--b1);}
.r-row:last-child{border-bottom:none;}
.r-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--mu);min-width:34px;text-align:right;line-height:1;}
.r-num.gold{color:var(--ac);}
.r-name{font-size:14px;color:var(--tx);flex:1;}
.r-detail{font-size:11px;color:var(--mu);}

/* BUTTONS */
.btn{padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s;font-family:'DM Sans',sans-serif;}
.btn:active{transform:scale(.98);}
.btn-p{background:var(--ac);color:#000;}
.btn-p:hover{opacity:.88;}
.btn-g{background:transparent;color:var(--mu2);border:1px solid var(--b2);}
.btn-g:hover{color:var(--tx);background:var(--s2);}
.btn-sm{padding:7px 14px;font-size:11px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.hwb{width:100%;padding:6px 8px;background:transparent;border:1px solid var(--b1);border-radius:6px;color:var(--mu);font-size:10px;letter-spacing:.04em;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .12s,border-color .12s;}
.hwb:hover{color:var(--tx);border-color:var(--b2);}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="logo-wrap">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="14" cy="17" rx="5.5" ry="4.5" fill="#d4a843"/>
      <ellipse cx="14" cy="10.5" rx="4" ry="3.5" fill="#d4a843"/>
      <path d="M11 8 Q9.5 4.5 8 5.5" stroke="#d4a843" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M17 8 Q18.5 4.5 20 5.5" stroke="#d4a843" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <ellipse cx="10.5" cy="9.5" rx="1.2" ry="1.8" fill="#d4a843" transform="rotate(-20 10.5 9.5)"/>
      <ellipse cx="17.5" cy="9.5" rx="1.2" ry="1.8" fill="#d4a843" transform="rotate(20 17.5 9.5)"/>
      <rect x="10" y="20.5" width="2" height="4.5" rx="1" fill="#d4a843"/>
      <rect x="16" y="20.5" width="2" height="4.5" rx="1" fill="#d4a843"/>
      <circle cx="12.5" cy="10" r="0.8" fill="#0a0a0a"/>
      <circle cx="15.5" cy="10" r="0.8" fill="#0a0a0a"/>
      <path d="M13 13.5 Q14 15 15 13.5" stroke="#c4a832" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="logo">TierGoat</span>
  </div>
  <a href="index.html" class="hdr-back">&#8592; All Rankers</a>
</div>

<div class="main">

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="h-title">Rank the<br><em>Best</em><br>Pictures</div>
  <p class="h-desc">Every Best Picture winner from 2000–2024, ranked by you. Head-to-head matchups until your definitive list is locked.</p>
  <p class="h-meta"><span>25 items</span> &nbsp;·&nbsp; ~24 questions avg</p>
  <div class="btn-row">
    <button class="btn btn-p" onclick="startQuiz()">Start Ranking</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="s-quiz">
  <div class="q-lbl">Best Picture Winners</div>
  <div class="q-prog-row"><span id="qnum" style="color:var(--mu)">Question 1</span></div>
  <div class="pbar"><div class="pfill" id="qpf" style="width:0%"></div></div>
  <div class="q-hint" id="qhint"></div>
  <div class="vs">
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <div class="vc" onclick="pick('hi')" style="padding:12px 10px;flex:1;">
        <img id="poster-a" src="" alt="" style="display:none;width:100%;max-width:120px;border-radius:6px;margin:0 auto 8px;object-fit:cover;aspect-ratio:2/3;">
        <div class="vc-name" id="vna" style="font-size:14px;">—</div>
        <div class="vc-detail" id="vda">—</div>
      </div>
      <button class="hwb" onclick="skipFilm('a')">Haven't watched</button>
    </div>
    <div class="vs-sep">vs</div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <div class="vc" onclick="pick('lo')" style="padding:12px 10px;flex:1;">
        <img id="poster-b" src="" alt="" style="display:none;width:100%;max-width:120px;border-radius:6px;margin:0 auto 8px;object-fit:cover;aspect-ratio:2/3;">
        <div class="vc-name" id="vnb" style="font-size:14px;">—</div>
        <div class="vc-detail" id="vdb">—</div>
      </div>
      <button class="hwb" onclick="skipFilm('b')">Haven't watched</button>
    </div>
  </div>
  <div class="btn-actions">
    <button class="cmp-btn" id="undo-btn" style="display:none" onclick="undoPick()">&#8592; Undo</button>
  </div>
  <div class="btn-row" style="gap:8px;flex-wrap:wrap">
    <button class="btn btn-g btn-sm" onclick="showPartial()">See ranking so far</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="s-res">
  <div class="res-title">Your Ranking</div>
  <div class="res-meta" id="res-meta"></div>
  <div id="res-list"></div>
  <div class="btn-row" style="margin-top:20px">
    <button class="btn btn-p" onclick="startQuiz()">Start Over</button>
    <button class="btn btn-g" id="continue-btn" style="display:none" onclick="continueQuiz()">Keep going</button>
  </div>
</div>

</div>
</div>

<script>
const ITEMS = [
  {n:'Gladiator',p:'/6WBIzCgmDCYrqh64yDREGeDk9d3.jpg',d:'2000 · Ridley Scott'},
  {n:'A Beautiful Mind',p:'/zwzWCmH72OSC9NA0ipoqyoBSMNd.jpg',d:'2001 · Ron Howard'},
  {n:'Chicago',p:'/fd4SFCudoNmZiYhNDimgVamSl1Z.jpg',d:'2002 · Rob Marshall'},
  {n:'The Lord of the Rings: Return of the King',p:'/rCzpDGLbOoPwLjy3OAm5NUPOTrC.jpg',d:'2003 · Peter Jackson'},
  {n:'Million Dollar Baby',p:'/aGmWuDtPadiJu8AZFRxNgcnT5qt.jpg',d:'2004 · Clint Eastwood'},
  {n:'Crash',p:'/pG3oWbOLPCB4HGM8GkFLCmgmlRC.jpg',d:'2005 · Paul Haggis'},
  {n:'The Departed',p:'/nT97ifVT2J1yMQmeq20Qblg61T.jpg',d:'2006 · Martin Scorsese'},
  {n:'No Country for Old Men',p:'/btTdmkgIvOi0FFip1sPuZI2oQG6.jpg',d:'2007 · Coen Brothers'},
  {n:'Slumdog Millionaire',p:'/iMXbAADRILsGPILHt8t8Kz7M3AR.jpg',d:'2008 · Danny Boyle'},
  {n:'The Hurt Locker',p:'/dPiyDKaGRdADuFdBwCyYRqJbWBr.jpg',d:'2009 · Kathryn Bigelow'},
  {n:"The King's Speech",p:'/4O7ooxn5JdJcuuVzOAEZXGjaaSY.jpg',d:'2010 · Tom Hooper'},
  {n:'The Artist',p:'/n9P4pHnDqy0R2Kj8bJRBPOr5oVE.jpg',d:'2011 · Michel Hazanavicius'},
  {n:'Argo',p:'/oOv2oOVOGaKnTon1pFqDFUMBFqZ.jpg',d:'2012 · Ben Affleck'},
  {n:'12 Years a Slave',p:'/xdANQHTFCBGqFmOcNMBFbgJM0KY.jpg',d:'2013 · Steve McQueen'},
  {n:'Birdman',p:'/rZIrLJaXzFGBTHH3CnJCBOCNHXh.jpg',d:'2014 · Alejandro G. Iñárritu'},
  {n:'Spotlight',p:'/6kGRhnfkHn8WNqV3Kop7XEPJ7uA.jpg',d:'2015 · Tom McCarthy'},
  {n:'Moonlight',p:'/4911T5FbJ9eAlnSHflq9430qqYu.jpg',d:'2016 · Barry Jenkins'},
  {n:'The Shape of Water',p:'/k4FwHlMhuRR5BISY2Gm2QZHlH5Q.jpg',d:'2017 · Guillermo del Toro'},
  {n:'Green Book',p:'/7BsvSHFanTkE5HwB5q5ZbNnBiGS.jpg',d:'2018 · Peter Farrelly'},
  {n:'Parasite',p:'/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg',d:'2019 · Bong Joon-ho'},
  {n:'Nomadland',p:'/nEoRFe0llRNkMMNJNlX47JLnEJX.jpg',d:'2020 · Chloé Zhao'},
  {n:'CODA',p:'/6jv5OjgWUFBrfELm5mVOFMVOWtP.jpg',d:'2021 · Sian Heder'},
  {n:'Everything Everywhere All at Once',p:'/w3LxiVYdWWRvEVdn5RYq6jIqkb1.jpg',d:'2022 · Daniels'},
  {n:'Oppenheimer',p:'/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg',d:'2023 · Christopher Nolan'},
  {n:'Anora',p:'/a0HFnG6nkJSfflliuuJWbMBJTcx.jpg',d:'2024 · Sean Baker'}
];

let sorted=[], queue=[], current=-1, lo=0, hi=0, qNum=0, history=[], unseen=[];

function mxQ(n){let t=0;for(let i=2;i<=n;i++)t+=Math.ceil(Math.log2(i));return t;}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function startQuiz(){
  const ix=ITEMS.map((_,i)=>i);shuf(ix);
  sorted=[ix[0]];queue=ix.slice(1);current=-1;qNum=0;history=[];unseen=[];
  document.getElementById('undo-btn').style.display='none';
  show('s-quiz');nextInsertion();
}

function nextInsertion(){
  if(queue.length===0){showResults(true);return;}
  current=queue.shift();lo=0;hi=sorted.length;ask();
}

function ask(){
  if(lo>=hi){sorted.splice(lo,0,current);nextInsertion();return;}
  const mid=Math.floor((lo+hi)/2),piv=sorted[mid];
  const ins=ITEMS[current],pv=ITEMS[piv];
  const base='https://image.tmdb.org/t/p/w185';
  document.getElementById('vna').textContent=ins.n;
  document.getElementById('vda').textContent=ins.d;
  const imgA=document.getElementById('poster-a');
  if(imgA){imgA.src=ins.p?base+ins.p:'';imgA.style.display=ins.p?'block':'none';}
  document.getElementById('vnb').textContent=pv.n;
  document.getElementById('vdb').textContent=pv.d;
  const imgB=document.getElementById('poster-b');
  if(imgB){imgB.src=pv.p?base+pv.p:'';imgB.style.display=pv.p?'block':'none';}
  qNum++;
  const pct=Math.min(97,Math.round((qNum/mxQ(ITEMS.length))*100));
  document.getElementById('qhint').textContent=
    `Placing "${ins.n}" — comparing vs. #${mid+1} in your ranking. ${queue.length} item${queue.length!==1?'s':''} still to place.`;
  document.getElementById('qnum').textContent=`Question ${qNum}`;
  document.getElementById('qpf').style.width=pct+'%';
}

function pick(ch){
  history.push({sorted:[...sorted],queue:[...queue],current,lo,hi,qNum,unseen:[...unseen]});
  document.getElementById('undo-btn').style.display='';
  const mid=Math.floor((lo+hi)/2);
  if(ch==='hi')hi=mid;else lo=mid+1;
  ask();
}

function undoPick(){
  if(history.length===0)return;
  const h=history.pop();
  sorted=h.sorted;queue=h.queue;current=h.current;lo=h.lo;hi=h.hi;qNum=h.qNum;if(h.unseen)unseen=h.unseen;
  if(history.length===0)document.getElementById('undo-btn').style.display='none';
  show('s-quiz');ask();
}

function skipFilm(side){
  history.push({sorted:[...sorted],queue:[...queue],current,lo,hi,qNum,unseen:[...unseen]});
  document.getElementById('undo-btn').style.display='';
  const mid=Math.floor((lo+hi)/2);
  if(side==='a'){
    // Skip the film being placed (current) — move to unseen, advance queue
    unseen.push(current);
    current=-1;lo=0;hi=0;
    nextInsertion();
  } else {
    // Skip the pivot film (sorted[mid]) — remove from sorted, put in unseen
    // The current insertion continues but now searches a smaller sorted list
    const pivotIdx=sorted.splice(mid,1)[0];
    unseen.push(pivotIdx);
    // Clamp lo/hi since sorted shrank
    hi=Math.min(hi,sorted.length);
    lo=Math.min(lo,sorted.length);
    ask();
  }
}
function showPartial(){
  const partial=[...sorted,...(current>=0?[current]:[]),...queue];
  buildResults(partial, false);
  document.getElementById('continue-btn').style.display='';
  show('s-res');
}

function continueQuiz(){
  document.getElementById('continue-btn').style.display='none';
  show('s-quiz');ask();
}

function showResults(complete){
  buildResults(sorted, complete);
  if(!complete)document.getElementById('continue-btn').style.display='';
  show('s-res');
}

function buildResults(list, complete){
  const watched=list.filter(i=>!unseen.includes(i));
  document.getElementById('res-meta').textContent = complete
    ? `${watched.length} film${watched.length!==1?'s':''} ranked in ${qNum} questions.${unseen.length?' '+unseen.length+' marked as unseen.':''}`
    : `Partial — ${qNum} questions. ${queue.length} still to place.${unseen.length?' '+unseen.length+' unseen.':''}`;
  const el=document.getElementById('res-list');
  el.innerHTML='';
  // Ranked films
  watched.forEach((idx,rank)=>{
    const item=ITEMS[idx];
    const row=document.createElement('div');row.className='r-row';
    const nc=rank<10?'r-num gold':'r-num';
    const pImg=item.p?`<img src="https://image.tmdb.org/t/p/w92${item.p}" style="width:36px;height:54px;object-fit:cover;border-radius:3px;flex-shrink:0;" alt="">`:'<div style="width:36px;height:54px;background:var(--s2);border-radius:3px;flex-shrink:0;"></div>';
    row.innerHTML=`<div class="${nc}">${rank+1}</div>${pImg}<div class="r-name" style="font-size:13px;">${item.n}</div><div class="r-detail">${item.d}</div>`;
    el.appendChild(row);
  });
  // Unseen section
  if(unseen.length>0){
    const div=document.createElement('div');
    div.style.cssText='margin:24px 0 8px;padding-top:16px;border-top:1px solid var(--b1);';
    div.innerHTML='<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);font-weight:500;margin-bottom:10px">Have Not Watched</div>';
    el.appendChild(div);
    unseen.forEach(idx=>{
      const item=ITEMS[idx];
      const row=document.createElement('div');row.className='r-row';
      const pImg=item.p?`<img src="https://image.tmdb.org/t/p/w92${item.p}" style="width:36px;height:54px;object-fit:cover;border-radius:3px;flex-shrink:0;opacity:.45;" alt="">`:'<div style="width:36px;height:54px;background:var(--s2);border-radius:3px;flex-shrink:0;"></div>';
      row.innerHTML=`<div class="r-num" style="color:var(--mu);font-size:16px">—</div>${pImg}<div class="r-name" style="font-size:13px;color:var(--mu2)">${item.n}</div><div class="r-detail">${item.d}</div>`;
      el.appendChild(row);
    });
  }
}
</script>
</body>
</html>
