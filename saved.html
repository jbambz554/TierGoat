<style>
:root{--bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.22);--tx:#f0f0f0;--mu:#555;--mu2:#888;--ac:#e8c84a;--ac2:#c4a832;--red:#e85a4a;--green:#4acd8d;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--b1);}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--ac);}
.nav-links{display:flex;gap:8px;}
.nav-link{font-size:12px;color:var(--mu2);text-decoration:none;letter-spacing:.04em;padding:6px 14px;border:1px solid var(--b2);border-radius:6px;transition:color .12s,border-color .12s;}
.nav-link:hover{color:var(--tx);border-color:var(--b3);}
.nav-link.active{color:var(--ac);border-color:rgba(232,200,74,.4);}
.main{max-width:860px;margin:0 auto;padding:48px 32px 80px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:3px;line-height:.95;margin-bottom:6px;}
.page-title em{color:var(--ac);font-style:normal;}
.page-sub{font-size:13px;color:var(--mu2);margin-bottom:36px;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.ftab{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;letter-spacing:.04em;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--mu2);font-family:'DM Sans',sans-serif;transition:all .12s;}
.ftab:hover{color:var(--tx);border-color:var(--b3);}
.ftab.on{background:var(--ac);color:#000;border-color:var(--ac);}
.saves-list{display:flex;flex-direction:column;gap:14px;}
.save-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;transition:border-color .12s;}
.save-card:hover{border-color:var(--b2);}
.save-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;gap:12px;cursor:pointer;}
.save-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.save-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--tx);transition:color .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.save-card-hdr:hover .save-title{color:var(--ac);}
.save-meta{font-size:11px;color:var(--mu);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.save-ranker-tag{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--mu2);letter-spacing:.04em;}
.save-card-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rerank-btn{padding:7px 14px;background:var(--ac);color:#000;border:none;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:opacity .12s;}
.rerank-btn:hover{opacity:.85;}
.del-btn{background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px;line-height:1;}
.del-btn:hover{color:var(--red);}
.chevron{font-size:11px;color:var(--mu);transition:transform .18s;user-select:none;}
.chevron.open{transform:rotate(180deg);}
.save-card-body{display:none;padding:0 20px 16px;}
.save-card-body.open{display:block;}
.divider{border:none;border-top:1px solid var(--b1);margin-bottom:16px;}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:2px 16px;}
.item-row{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:.5px solid var(--b1);font-size:13px;}
.item-row:last-child{border-bottom:none;}
.item-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--mu);min-width:28px;text-align:right;line-height:1;}
.item-num.g{color:var(--ac);}
.item-emoji{font-size:14px;min-width:20px;}
.item-name{color:var(--tx);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pos-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--b1);}
.pos-section-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);font-weight:500;margin-bottom:12px;}
.pos-group{margin-bottom:14px;}
.pos-group-lbl{font-size:11px;font-weight:500;color:var(--ac);margin-bottom:6px;letter-spacing:.04em;}
.empty-state{text-align:center;padding:80px 32px;color:var(--mu);}
.empty-icon{font-size:52px;margin-bottom:16px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--mu2);margin-bottom:8px;}
.empty-sub{font-size:13px;line-height:1.7;}
.empty-sub a{color:var(--ac);text-decoration:none;}
footer{border-top:1px solid var(--b1);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--mu);}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--ac);opacity:.6;}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <ellipse cx="14" cy="17" rx="5.5" ry="4.5" fill="#e8c84a"/>
      <ellipse cx="14" cy="10.5" rx="4" ry="3.5" fill="#e8c84a"/>
      <path d="M11 8 Q9.5 4.5 8 5.5" stroke="#e8c84a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M17 8 Q18.5 4.5 20 5.5" stroke="#e8c84a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <ellipse cx="10.5" cy="9.5" rx="1.2" ry="1.8" fill="#e8c84a" transform="rotate(-20 10.5 9.5)"/>
      <ellipse cx="17.5" cy="9.5" rx="1.2" ry="1.8" fill="#e8c84a" transform="rotate(20 17.5 9.5)"/>
      <rect x="10" y="20.5" width="2" height="4.5" rx="1" fill="#e8c84a"/>
      <rect x="16" y="20.5" width="2" height="4.5" rx="1" fill="#e8c84a"/>
      <circle cx="12.5" cy="10" r="0.8" fill="#0a0a0a"/>
      <circle cx="15.5" cy="10" r="0.8" fill="#0a0a0a"/>
      <path d="M13 13.5 Q14 15 15 13.5" stroke="#c4a832" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="nav-logo-text">TierGoat</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link active" href="saved.html">My Rankings</a>
  </div>
</nav>

<div class="main">
  <div class="page-title">My <em>Saved</em><br>Rankings</div>
  <p class="page-sub">All your rankings across every list — tap any to expand, or rank again.</p>
  <div class="filter-row" id="filter-row"></div>
  <div class="saves-list" id="saves-list"></div>
</div>

<footer>
  <span class="footer-logo">TierGoat</span>
  <span>Rank everything. Settle nothing.</span>
</footer>

<script>
var RANKERS = [
  {key:"nba",         label:"NBA All-Time Top 50",  url:"nba.html"},
  {key:"nfl",         label:"NFL QBs",              url:"nfl.html"},
  {key:"oscars",      label:"Oscar Best Pictures of the 21st Century",          url:"oscars.html"},
  {key:"fastfood",    label:"Fast Food",             url:"fastfood.html"},
  {key:"sitcoms",     label:"Best Sitcoms of the 21st Century",          url:"sitcoms.html"},
  {key:"music_2010s", label:"Best Artists 2010s",   url:"music_2010s.html"},
  {key:"music_2020s", label:"Best Artists 2020s",   url:"music_2020s.html"},
  {key:"pizza",       label:"Pizza Toppings",        url:"pizza.html"},
  {key:"cuisines",    label:"Cultural Cuisines",     url:"cuisines.html"},
  {key:"rappers",     label:"Best Rappers",          url:"rappers.html"},
  {key:"custom",      label:"Custom",                url:"custom.html"},
  {key:"nfl_qbs",     label:"Current NFL QBs",       url:"nfl_qbs.html"},
  {key:"nfl_wrs",     label:"Current NFL WRs",       url:"nfl_wrs.html"},
  {key:"nfl_rbs",     label:"Current NFL RBs",       url:"nfl_rbs.html"},
  {key:"nfl_power",   label:"NFL Power Rankings",    url:"nfl_power.html"},
  {key:"nba_power",   label:"NBA Power Rankings",    url:"nba_power.html"}
];

var activeFilter = "all";

function loadAllSaves() {
  var all = [];
  RANKERS.forEach(function(r) {
    try {
      var raw = localStorage.getItem("tg_saves_" + r.key);
      var saves = raw ? JSON.parse(raw) : [];
      saves.forEach(function(s) {
        var entry = {};
        Object.keys(s).forEach(function(k){ entry[k] = s[k]; });
        entry.rankerKey   = r.key;
        entry.rankerLabel = r.label;
        entry.rankerUrl   = r.url;
        all.push(entry);
      });
    } catch(e) {}
  });
  all.sort(function(a,b){ return b.id - a.id; });
  return all;
}

function deleteSave(rankerKey, id) {
  try {
    var raw = localStorage.getItem("tg_saves_" + rankerKey);
    var saves = raw ? JSON.parse(raw) : [];
    var updated = saves.filter(function(s){ return s.id !== id; });
    localStorage.setItem("tg_saves_" + rankerKey, JSON.stringify(updated));
  } catch(e) {}
  render();
}

function toggleBody(id) {
  var body = document.getElementById("body-" + id);
  var chev = document.getElementById("chev-" + id);
  if (!body) return;
  if (body.classList.contains("open")) {
    body.classList.remove("open");
    chev.classList.remove("open");
  } else {
    body.classList.add("open");
    chev.classList.add("open");
  }
}

function setFilter(key) {
  activeFilter = key;
  render();
}

function buildFilterTabs(saves) {
  var row = document.getElementById("filter-row");
  var keys = [];
  saves.forEach(function(s) {
    if (keys.indexOf(s.rankerKey) === -1) keys.push(s.rankerKey);
  });

  var html = "";
  var allClass = activeFilter === "all" ? " on" : "";
  html += '<button class="ftab' + allClass + '" onclick="setFilter(\'all\')">All</button>';

  keys.forEach(function(k) {
    var r = null;
    RANKERS.forEach(function(rr){ if(rr.key === k) r = rr; });
    if (!r) return;
    var cls = activeFilter === k ? " on" : "";
    html += '<button class="ftab' + cls + '" onclick="setFilter(\'' + k + '\')">' + r.label + '</button>';
  });

  row.innerHTML = html;
}

function buildItemsHtml(save) {
  var html = '<div class="items-grid">';
  var items = save.items || [];
  items.forEach(function(item) {
    var g = item.rank <= 10 ? " g" : "";
    var emoji = item.emoji ? '<div class="item-emoji">' + item.emoji + "</div>" : "";
    html += '<div class="item-row"><div class="item-num' + g + '">' + item.rank + "</div>" + emoji + '<div class="item-name">' + item.name + "</div></div>";
  });
  html += "</div>";

  // NBA top-50 positional breakdowns
  if (save.type === "top50" && save.posBreakdowns) {
    var pbs = Object.values ? Object.values(save.posBreakdowns) : Object.keys(save.posBreakdowns).map(function(k){ return save.posBreakdowns[k]; });
    if (pbs.length > 0) {
      html += '<div class="pos-section"><div class="pos-section-lbl">By Position</div>';
      pbs.forEach(function(pb) {
        html += '<div class="pos-group"><div class="pos-group-lbl">' + pb.label + '</div><div class="items-grid">';
        pb.players.forEach(function(p) {
          var g = p.rank <= 5 ? " g" : "";
          html += '<div class="item-row"><div class="item-num' + g + '">' + p.rank + '</div><div class="item-name">' + p.name + "</div></div>";
        });
        html += "</div></div>";
      });
      html += "</div>";
    }
  }
  return html;
}

function render() {
  var all = loadAllSaves();
  buildFilterTabs(all);

  var filtered = activeFilter === "all" ? all : all.filter(function(s){ return s.rankerKey === activeFilter; });
  var list = document.getElementById("saves-list");

  if (filtered.length === 0) {
    var msg = activeFilter === "all"
      ? "You haven't saved any rankings yet.<br>Head to <a href=\"index.html\">a ranker</a> and complete a ranking to save it here."
      : "No saved rankings for this category yet.";
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">\uD83D\uDC10</div><div class="empty-title">Nothing Here Yet</div><div class="empty-sub">' + msg + "</div></div>";
    return;
  }

  var html = "";
  filtered.forEach(function(s) {
    var count = (s.items || []).length;
    var subtitle = s.date + " \u00B7 " + s.rankerLabel;
    if (s.type === "top50") subtitle += " \u00B7 Top 50";
    if (s.type === "position" && s.posLabel) subtitle += " \u00B7 " + s.posLabel;

    html += '<div class="save-card">';
    html += '<div class="save-card-hdr" onclick="toggleBody(' + s.id + ')">';
    html += '<div class="save-left">';
    html += '<div class="save-title">' + s.name + "</div>";
    html += '<div class="save-meta"><span class="save-ranker-tag">' + s.rankerLabel + "</span><span>" + s.date + "</span><span>" + count + " ranked</span></div>";
    html += "</div>";
    html += '<div class="save-card-actions">';
    html += '<button class="rerank-btn" onclick="event.stopPropagation();window.location.href=\'' + s.rankerUrl + '\'">Rank Again &#8594;</button>';
    html += '<button class="del-btn" onclick="event.stopPropagation();deleteSave(\'' + s.rankerKey + '\',' + s.id + ')" title="Delete">&#215;</button>';
    html += '<span class="chevron" id="chev-' + s.id + '">&#9660;</span>';
    html += "</div></div>";
    html += '<div class="save-card-body" id="body-' + s.id + '">';
    html += '<hr class="divider">';
    html += buildItemsHtml(s);
    html += "</div></div>";
  });

  list.innerHTML = html;
}

render();
</script>
</body>
</html>
