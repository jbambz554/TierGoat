<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TierGoat — NFL All-Time QBs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.22);--tx:#efefef;--mu:#5a5a5a;--mu2:#888;--ac:#3dba6e;--red:#e85a4a;--green:#4acd8d;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;}
.app{min-height:100vh;}
.hdr{padding:16px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:14px;}
.logo-wrap{display:flex;align-items:center;gap:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--ac);}
.hdr-back{font-size:11px;color:var(--mu);text-decoration:none;letter-spacing:.04em;opacity:.7;}
.hdr-back:hover{opacity:1;color:var(--tx);}
.main{max-width:560px;margin:0 auto;width:100%;padding:28px 20px 48px;}
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}

.h-title{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:.95;letter-spacing:3px;margin-bottom:10px;}
.h-title em{color:var(--ac);font-style:normal;}
.h-desc{font-size:13px;color:var(--mu2);line-height:1.75;margin-bottom:10px;max-width:400px;}
.h-meta{font-size:12px;color:var(--mu);margin-bottom:28px;}
.h-meta span{color:var(--ac);}

.q-lbl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--ac);margin-bottom:2px;}
.q-prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-bottom:6px;}
.pbar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;margin-bottom:16px;}
.pfill{height:100%;background:var(--ac);border-radius:1px;transition:width .22s;}
.q-hint{font-size:12px;color:var(--mu2);margin-bottom:16px;min-height:30px;line-height:1.55;}
.vs{display:flex;gap:8px;margin-bottom:10px;}
.vc{flex:1;background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s,transform .1s;position:relative;overflow:hidden;}
.vc::after{content:'';position:absolute;inset:0;background:var(--ac);opacity:0;transition:opacity .12s;}
.vc:hover{border-color:var(--ac);background:var(--s2);}
.vc:hover::after{opacity:.04;}
.vc:active{transform:scale(.97);}
.vc-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--tx);margin-bottom:3px;position:relative;}
.vc-detail{font-size:11px;color:var(--mu);position:relative;line-height:1.4;}
.vs-sep{display:flex;align-items:center;justify-content:center;width:24px;flex-shrink:0;font-size:11px;color:var(--mu);font-weight:500;}
.btn-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.cmp-btn{background:var(--s2);border:1px solid var(--b2);color:var(--mu2);border-radius:6px;padding:5px 11px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:color .12s,border-color .12s;}
.cmp-btn:hover{color:var(--tx);border-color:var(--b3);}

.res-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--ac);margin-bottom:4px;}
.res-meta{font-size:12px;color:var(--mu);margin-bottom:20px;}
.r-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--b1);}
.r-row:last-child{border-bottom:none;}
.r-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--mu);min-width:34px;text-align:right;line-height:1;}
.r-num.gold{color:var(--ac);}
.r-name{font-size:14px;color:var(--tx);flex:1;}
.r-detail{font-size:11px;color:var(--mu);}

/* COMPARE MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--ac);}
.modal-close{background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer;padding:4px;}
.modal-close:hover{color:var(--tx);}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b1);}
.cmp-col{padding:14px 16px;}
.cmp-col+.cmp-col{border-left:1px solid var(--b1);}
.cmp-pname{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.5px;color:var(--tx);margin-bottom:2px;}
.cmp-era{font-size:11px;color:var(--mu);margin-bottom:10px;}
.stat-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:.5px solid var(--b1);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{color:var(--mu2);}
.stat-val{font-weight:500;color:var(--tx);}
.stat-val.hi{color:var(--green);}
.acc-sec{padding:12px 16px;border-bottom:1px solid var(--b1);}
.acc-sec:last-child{border-bottom:none;}
.acc-title{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.acc-tag{display:inline-block;font-size:11px;background:var(--s2);border:1px solid var(--b2);border-radius:4px;padding:2px 7px;margin:2px 2px 0 0;color:var(--mu2);}

.btn{padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s;font-family:'DM Sans',sans-serif;}
.btn:active{transform:scale(.98);}
.btn-p{background:var(--ac);color:#000;}
.btn-p:hover{opacity:.88;}
.btn-g{background:transparent;color:var(--mu2);border:1px solid var(--b2);}
.btn-g:hover{color:var(--tx);background:var(--s2);}
.btn-sm{padding:7px 14px;font-size:11px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

/* SAVE SYSTEM */
.save-btn{background:var(--s2);border:1px solid var(--b2);color:var(--ac);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .12s,border-color .12s;}
.save-btn:hover{background:var(--s3);border-color:var(--b3);}
.saved-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:16px;}
.saved-modal-bg.open{display:flex;}
.saved-modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:500px;max-height:88vh;display:flex;flex-direction:column;}
.saved-modal-hdr{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.saved-modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--ac);}
.saved-modal-close{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1;}
.saved-modal-close:hover{color:var(--tx);}
.saved-modal-body{overflow-y:auto;padding:14px 18px;flex:1;}
.saved-entry{border:1px solid var(--b1);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.saved-entry-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--s2);}
.saved-entry-name{font-size:13px;font-weight:500;color:var(--tx);}
.saved-entry-date{font-size:11px;color:var(--mu);}
.saved-entry-del{background:none;border:none;color:var(--mu);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;}
.saved-entry-del:hover{color:var(--red);background:rgba(232,90,74,.1);}
.saved-entry-list{padding:10px 14px;}
.saved-item-row{display:flex;gap:8px;align-items:center;padding:4px 0;font-size:12px;color:var(--mu2);border-bottom:.5px solid var(--b1);}
.saved-item-row:last-child{border-bottom:none;}
.saved-item-num{font-family:'Bebas Neue',sans-serif;font-size:16px;min-width:26px;text-align:right;color:var(--mu);}
.saved-item-num.g{color:var(--ac);}
.saved-item-name{flex:1;color:var(--tx);}
.no-saves{color:var(--mu);font-size:13px;text-align:center;padding:24px 0;}
.save-name-row{display:flex;gap:8px;margin-bottom:14px;}
.save-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;}
.save-input:focus{border-color:var(--ac);}
.save-input::placeholder{color:var(--mu);}

.man-list{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.man-item{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;cursor:grab;user-select:none;touch-action:none;}
.man-item:active{cursor:grabbing;}
.man-item.dragging{opacity:.4;border-style:dashed;}
.man-item.drag-over{border-color:var(--ac);background:var(--s2);}
.man-rank{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--mu);min-width:24px;text-align:right;line-height:1;}
.man-rank.gold{color:var(--ac);}
.man-emoji{font-size:17px;min-width:22px;text-align:center;}
.man-name{font-size:12px;color:var(--tx);flex:1;}
.man-handle{font-size:13px;color:var(--mu);padding:0 2px;opacity:.4;}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <a href="index.html" style="text-decoration:none;" class="logo-wrap">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <ellipse cx="14" cy="17" rx="5.5" ry="4.5" fill="#3dba6e"/>
      <ellipse cx="14" cy="10.5" rx="4" ry="3.5" fill="#3dba6e"/>
      <path d="M11 8 Q9.5 4.5 8 5.5" stroke="#3dba6e" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M17 8 Q18.5 4.5 20 5.5" stroke="#3dba6e" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <ellipse cx="10.5" cy="9.5" rx="1.2" ry="1.8" fill="#3dba6e" transform="rotate(-20 10.5 9.5)"/>
      <ellipse cx="17.5" cy="9.5" rx="1.2" ry="1.8" fill="#3dba6e" transform="rotate(20 17.5 9.5)"/>
      <rect x="10" y="20.5" width="2" height="4.5" rx="1" fill="#3dba6e"/>
      <rect x="16" y="20.5" width="2" height="4.5" rx="1" fill="#3dba6e"/>
      <circle cx="12.5" cy="10" r="0.8" fill="#0a0a0a"/>
      <circle cx="15.5" cy="10" r="0.8" fill="#0a0a0a"/>
      <path d="M13 13.5 Q14 15 15 13.5" stroke="#2e9a56" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="logo">TierGoat</span>
  </a>
  <a href="index.html" class="hdr-back">&#8592; All Rankers</a>
</div>
<div class="main">

<div class="screen active" id="s-home">
  <div class="h-title">Rank the<br><em>All-Time</em><br>NFL QBs</div>
  <p class="h-desc">Head-to-head matchups to build your definitive ranking of the 25 greatest quarterbacks in NFL history — legends and active stars alike.</p>
  <p class="h-meta"><span>28 quarterbacks</span></p>
  <div class="btn-row"><button class="btn btn-p" onclick="startQuiz()">Head-to-Head</button></div>
  <div class="btn-row" style="margin-top:8px"><button class="save-btn" style="border-color:var(--ac);color:var(--ac);opacity:.85" onclick="startManual()">Manually Rank</button></div>
  <div class="btn-row" style="margin-top:10px"><button class="save-btn" onclick="openSavedModal()">View Saved Rankings</button></div>
</div>

<div class="screen" id="s-quiz">
  <div class="q-lbl">NFL Quarterbacks</div>
  
  <div class="pbar"><div class="pfill" id="qpf" style="width:0%"></div></div>
  <div class="q-hint" id="qhint"></div>
  <div class="vs">
    <div class="vc" onclick="pick('hi')">
      <div class="vc-name" id="vna">—</div>
      <div class="vc-detail" id="vda">—</div>
    </div>
    <div class="vs-sep">vs</div>
    <div class="vc" onclick="pick('lo')">
      <div class="vc-name" id="vnb">—</div>
      <div class="vc-detail" id="vdb">—</div>
    </div>
  </div>
  <div class="btn-actions">
    <button class="cmp-btn" onclick="openCompare()">Compare Stats</button>
    <button class="cmp-btn" id="undo-btn" style="display:none" onclick="undoPick()">&#8592; Undo</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-g btn-sm" onclick="showPartial()">See ranking so far</button>
    <button class="btn btn-g btn-sm" onclick="startManual()">Manually Rank</button>
  </div>
</div>

<div class="screen" id="s-res">
  <div class="res-title">Your Ranking</div>
  <div class="res-meta" id="res-meta"></div>
  <div id="res-list"></div>
  <div class="save-name-row" style="margin-top:20px">
    <input class="save-input" id="save-name-input" placeholder="Name this ranking (optional)…" maxlength="40">
    <button class="save-btn" id="save-ranking-btn" onclick="saveRanking()">Save Ranking</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="startQuiz()">Start Over</button>
    <button class="btn btn-g" id="continue-btn" style="display:none" onclick="continueQuiz()">Keep going</button>
  </div>
</div>

</div>
</div>

<!-- COMPARE MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Player Comparison</div>
      <button class="modal-close" onclick="closeCompare()">&#215;</button>
    </div>
    <div class="cmp-grid" id="cmp-grid"></div>
    <div id="cmp-acc-a" class="acc-sec"></div>
    <div id="cmp-acc-b" class="acc-sec"></div>
  </div>
</div>

<script>
const QBS = [
  {n:'Tom Brady',        d:'2000–2022',  s:{yds:89214,td:649,int:212,rate:97.2}, ac:['7× Super Bowl Champion','5× Super Bowl MVP','3× NFL MVP','15× Pro Bowl','All-time passing yards & TDs leader','200 career wins (record)']},
  {n:'Joe Montana',      d:'1979–1994',  s:{yds:40551,td:273,int:139,rate:92.3}, ac:['4× Super Bowl Champion','4× Super Bowl MVP','2× NFL MVP','8× Pro Bowl','Never threw a playoff INT in 4 Super Bowls','Hall of Fame (2000)']},
  {n:'Peyton Manning',   d:'1998–2015',  s:{yds:71940,td:539,int:251,rate:96.5}, ac:['2× Super Bowl Champion','1× Super Bowl MVP','5× NFL MVP (record)','14× Pro Bowl','Single-season record: 55 TDs (2013)','Hall of Fame (2021)']},
  {n:'Patrick Mahomes',  d:'2017–present',s:{yds:35939,td:267,int:99,rate:100.8},ac:['3× Super Bowl Champion','3× Super Bowl MVP','2× NFL MVP','6× Pro Bowl','Fastest QB to 50,000 yards','All-time playoff TD leader (active)']},
  {n:'Johnny Unitas',    d:'1956–1973',  s:{yds:40239,td:290,int:253,rate:78.2}, ac:['3× NFL Champion','1× Super Bowl Champion','3× NFL MVP','10× Pro Bowl','18 consecutive games with TD pass (record for 52 yrs)','Hall of Fame (1979)']},
  {n:'Brett Favre',      d:'1991–2010',  s:{yds:71838,td:508,int:336,rate:86.0}, ac:['1× Super Bowl Champion','3× NFL MVP (consecutive)','11× Pro Bowl','297 consecutive starts (record)','Hall of Fame (2016)']},
  {n:'Aaron Rodgers',    d:'2005–present',s:{yds:62952,td:503,int:105,rate:102.2},ac:['1× Super Bowl Champion','1× Super Bowl MVP','1× NFL MVP (4×)','10× Pro Bowl','Highest career passer rating all-time (active, 102.2)']},
  {n:'John Elway',       d:'1983–1998',  s:{yds:51475,td:300,int:226,rate:79.9}, ac:['2× Super Bowl Champion','1× Super Bowl MVP','1× NFL MVP','9× Pro Bowl','47 4th-quarter comeback wins','Hall of Fame (2004)']},
  {n:'Dan Marino',       d:'1983–1999',  s:{yds:61361,td:420,int:252,rate:86.4}, ac:['1× Super Bowl Appearance','1× NFL MVP','9× Pro Bowl','Single-season TD record: 48 TDs (1984, held until 2004)','Hall of Fame (2005)']},
  {n:'Steve Young',      d:'1984–1999',  s:{yds:33124,td:232,int:107,rate:96.8}, ac:['1× Super Bowl Champion','2× Super Bowl MVP','2× NFL MVP','7× Pro Bowl','Best career passer rating at retirement (96.8)','Hall of Fame (2005)']},
  {n:'Roger Staubach',   d:'1969–1979',  s:{yds:22700,td:153,int:109,rate:83.4}, ac:['2× Super Bowl Champion','1× Super Bowl MVP','6× Pro Bowl','23 4th-quarter comeback wins','Hall of Fame (1985)']},
  {n:'Terry Bradshaw',   d:'1970–1983',  s:{yds:27989,td:212,int:210,rate:70.9}, ac:['4× Super Bowl Champion','2× Super Bowl MVP','3× Pro Bowl','Hall of Fame (1989)']},
  {n:'Bart Starr',       d:'1956–1971',  s:{yds:24718,td:152,int:138,rate:80.5}, ac:['5× NFL/Super Bowl Champion','2× Super Bowl MVP','4× Pro Bowl','Career 104.8 playoff passer rating','Hall of Fame (1977)']},
  {n:'Troy Aikman',      d:'1989–2000',  s:{yds:32942,td:165,int:141,rate:81.6}, ac:['3× Super Bowl Champion','1× Super Bowl MVP','6× Pro Bowl','Hall of Fame (2006)']},
  {n:'Fran Tarkenton',   d:'1961–1978',  s:{yds:47003,td:342,int:266,rate:80.4}, ac:['3× Super Bowl Appearances','9× Pro Bowl','Led NFL in TDs 1975','Hall of Fame (1986)']},
  {n:'Josh Allen',       d:'2018–present',s:{yds:30102,td:220,int:87,rate:92.8},ac:['1× Super Bowl Champion (2025)','6× Pro Bowl','2× AFC Championship appearances','Most rushing TDs by a QB (active)']},
  {n:'Lamar Jackson',    d:'2018–present',s:{yds:22608,td:187,int:56,rate:102.2},ac:['2× NFL MVP','4× Pro Bowl','Highest career passer rating all-time (active, 102.2, tied Rodgers)','Ravens all-time TD leader']},
  {n:'Jim Kelly',        d:'1986–1996',  s:{yds:35467,td:237,int:175,rate:84.4}, ac:['4× consecutive Super Bowl Appearances (record)','5× Pro Bowl','Hall of Fame (2002)']},
  {n:'Otto Graham',      d:'1946–1955',  s:{yds:23584,td:174,int:135,rate:78.2}, ac:['3× NFL Champion','4× AAFC Champion','7× title game appearances in 10 seasons','6× Pro Bowl','Hall of Fame (1965)']},
  {n:'Drew Brees',       d:'2001–2020',  s:{yds:80358,td:571,int:243,rate:98.7}, ac:['1× Super Bowl Champion','1× Super Bowl MVP','13× Pro Bowl','2× Offensive Player of Year','2nd all-time: passing yards, TDs','Hall of Fame (2026)']},
  {n:'Ben Roethlisberger',d:'2004–2021', s:{yds:64088,td:418,int:211,rate:93.5}, ac:['2× Super Bowl Champion','Youngest Super Bowl-winning QB (23)','6× Pro Bowl','5th all-time passing yards','Rookie of Year (2004)','Hall of Fame (eligible 2027)']},
  {n:'Kurt Warner',      d:'1998–2009',  s:{yds:32344,td:208,int:128,rate:93.7}, ac:['1× Super Bowl Champion','1× Super Bowl MVP','2× NFL MVP','4× Pro Bowl','3× Super Bowl appearances','Grocery store clerk to Super Bowl MVP','Hall of Fame (2017)']},
  {n:'Matthew Stafford', d:'2009–present',s:{yds:64516,td:423,int:173,rate:94.5},ac:['1× Super Bowl Champion (2022)','1× Pro Bowl','3rd all-time career playoff passer rating (102.3)','NFL-record 7 seasons with 4+ game-winning drives']},
  {n:'Warren Moon',      d:'1984–2000',  s:{yds:49325,td:291,int:233,rate:80.9}, ac:['9× Pro Bowl','1× Offensive Player of Year (1990)','5× CFL Grey Cup (1978–82)','First African-American QB in Hall of Fame','Hall of Fame (2006)']},
  {n:'Russell Wilson',   d:'2012–present',s:{yds:46966,td:353,int:102,rate:99.3},ac:['1× Super Bowl Champion','2× Super Bowl Appearance','9× Pro Bowl','5th all-time career passer rating (99.3)','Fastest QB to 300 career TDs']},
  {n:'Matt Ryan',         d:'2008–2022',   s:{yds:62792,td:381,int:203,rate:94.8},ac:['1× NFL MVP (2016)','1× Offensive Player of Year','4× Pro Bowl','Super Bowl LI appearance','Offensive Rookie of Year (2008)','Top 10 all-time: yards, TDs, completions']},
  {n:'Philip Rivers',     d:'2004–2020',   s:{yds:63984,td:421,int:209,rate:95.2},ac:['8× Pro Bowl','4th all-time passing yards (active at retirement)','10× 4,000-yard seasons','Never missed a start due to injury (240 consecutive)']},
  {n:'Eli Manning',       d:'2004–2019',   s:{yds:57023,td:366,int:244,rate:84.1},ac:['2× Super Bowl Champion','2× Super Bowl MVP','4× Pro Bowl','210 consecutive starts (3rd all-time)','2 upsets of undefeated Patriots dynasties']},
];

let sorted=[],queue=[],current=-1,lo=0,hi=0,qNum=0,history=[];

function mxQ(n){let t=0;for(let i=2;i<=n;i++)t+=Math.ceil(Math.log2(i));return t;}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function startQuiz(){
  const ix=QBS.map((_,i)=>i);shuf(ix);
  sorted=[ix[0]];queue=ix.slice(1);current=-1;qNum=0;history=[];
  document.getElementById('undo-btn').style.display='none';
  show('s-quiz');nextInsertion();
}
function nextInsertion(){
  if(queue.length===0){showResults(true);return;}
  current=queue.shift();lo=0;hi=sorted.length;ask();
}
function ask(){
  if(lo>=hi){sorted.splice(lo,0,current);nextInsertion();return;}
  const mid=Math.floor((lo+hi)/2),piv=sorted[mid];
  const ins=QBS[current],pv=QBS[piv];
  document.getElementById('vna').textContent=ins.n;
  document.getElementById('vda').textContent=ins.d;
  document.getElementById('vnb').textContent=pv.n;
  document.getElementById('vdb').textContent=pv.d;
  qNum++;
  const pct=Math.min(97,Math.round((qNum/mxQ(QBS.length))*100));
  document.getElementById('qhint').textContent=`Placing ${ins.n} — comparing vs. #${mid+1} in your ranking. ${queue.length} QB${queue.length!==1?'s':''} still to place.`;
  document.getElementById('qpf').style.width=pct+'%';
}
function pick(ch){
  history.push({sorted:[...sorted],queue:[...queue],current,lo,hi,qNum});
  document.getElementById('undo-btn').style.display='';
  const mid=Math.floor((lo+hi)/2);
  if(ch==='hi')hi=mid;else lo=mid+1;
  ask();
}
function undoPick(){
  if(history.length===0)return;
  const h=history.pop();
  sorted=h.sorted;queue=h.queue;current=h.current;lo=h.lo;hi=h.hi;qNum=h.qNum;
  if(history.length===0)document.getElementById('undo-btn').style.display='none';
  show('s-quiz');ask();
}
function showPartial(){
  const partial=[...sorted,...(current>=0?[current]:[]),...queue];
  buildResults(partial,false);
  document.getElementById('continue-btn').style.display='';
  show('s-res');
}
function continueQuiz(){
  document.getElementById('continue-btn').style.display='none';
  show('s-quiz');ask();
}
function showResults(complete){
  buildResults(sorted,complete);
  if(!complete)document.getElementById('continue-btn').style.display='';
  show('s-res');
}
function buildResults(list,complete){
  document.getElementById('res-meta').textContent=complete
    ?`All ${QBS.length} QBs ranked in ${qNum} questions.`
    :`Partial — ${qNum} questions. ${queue.length} still to place.`;
  const el=document.getElementById('res-list');el.innerHTML='';
  list.forEach((idx,rank)=>{
    const q=QBS[idx];const row=document.createElement('div');row.className='r-row';
    const nc=rank<10?'r-num gold':'r-num';
    row.innerHTML=`<div class="${nc}">${rank+1}</div><div class="r-name">${q.n}</div><div class="r-detail">${q.d}</div>`;
    el.appendChild(row);
  });
}

// Compare modal
function openCompare(){
  const mid=Math.floor((lo+hi)/2);
  const a=QBS[current],b=QBS[sorted[mid]];
  renderModal(a,b);
}
function renderModal(a,b){
  const stats=[
    {k:'yds',l:'Pass Yards'},
    {k:'td',l:'Touchdowns'},
    {k:'int',l:'Interceptions'},
    {k:'rate',l:'Passer Rating'},
  ];
  const grid=document.getElementById('cmp-grid');grid.innerHTML='';
  [a,b].forEach((p,ci)=>{
    const col=document.createElement('div');col.className='cmp-col';
    let rows='';
    stats.forEach(st=>{
      const va=a.s[st.k],vb=b.s[st.k];
      // always show all stats
      const val=ci===0?(va!==null?va.toLocaleString():'N/A'):(vb!==null?vb.toLocaleString():'N/A');
      const vNum=ci===0?va:vb,oNum=ci===0?vb:va;
      // For interceptions, lower is better
      const isInt=st.k==='int';
      const hi=vNum!==null&&oNum!==null&&(isInt?vNum<oNum:vNum>oNum)?'hi':'';
      rows+=`<div class="stat-row"><span class="stat-lbl">${st.l}</span><span class="stat-val ${hi}">${val}</span></div>`;
    });
    col.innerHTML=`<div class="cmp-pname">${p.n}</div><div class="cmp-era">${p.d}</div>${rows}`;
    grid.appendChild(col);
  });
  ['a','b'].forEach((side,ci)=>{
    const p=ci===0?a:b;
    const sec=document.getElementById('cmp-acc-'+side);
    sec.innerHTML=`<div class="acc-title">${p.n} — Accolades</div>${p.ac.map(x=>`<span class="acc-tag">${x}</span>`).join('')}`;
  });
  document.getElementById('modal-bg').classList.add('open');
}
function closeCompare(){document.getElementById('modal-bg').classList.remove('open');}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCompare();});

</div><div class="man-name">'+item.n+'</div>';
    row.addEventListener('dragstart',function(){dragSrc=this;this.classList.add('dragging');});

<div class="saved-modal-bg" id="saved-modal-bg">
  <div class="saved-modal">
    <div class="saved-modal-hdr">
      <div class="saved-modal-title">Saved Rankings</div>

    </div>

  </div>
</div>

<script>
const RANKER_KEY = 'nfl';

// ── SAVE SYSTEM ──────────────────────────────────────────────────────────────
function getSaves() {
  try { return JSON.parse(localStorage.getItem('tg_saves_' + RANKER_KEY) || '[]'); }
  catch(e) { return []; }
}
function putSaves(arr) {
  localStorage.setItem('tg_saves_' + RANKER_KEY, JSON.stringify(arr));
}

function saveRanking() {
  const name = document.getElementById('save-name-input').value.trim() ||
    new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  // Collect the current displayed ranking from the results list
  const rows = document.querySelectorAll('#res-list .r-row');
  const items = [];
  rows.forEach(row => {
    const nameEl = row.querySelector('.r-name');
    const numEl  = row.querySelector('.r-num');
    const emojiEl = row.querySelector('.r-emoji');
    if (nameEl && numEl && !numEl.textContent.includes('—')) {
      items.push({
        rank: parseInt(numEl.textContent) || 0,
        name: nameEl.textContent.trim(),
        emoji: emojiEl ? emojiEl.textContent.trim() : ''
      });
    }
  });
  if (items.length === 0) return;
  const saves = getSaves();
  saves.unshift({
    id: Date.now(),
    name,
    date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}),
    items
  });
  putSaves(saves);
  document.getElementById('save-name-input').value = '';
  const btn = document.getElementById('save-ranking-btn');
  btn.textContent = '✓ Saved!';
  btn.style.color = 'var(--green)';
  setTimeout(() => { btn.textContent = 'Save Ranking'; btn.style.color = ''; }, 1800);
}

function openSavedModal() {
  renderSavedModal();
  document.getElementById('saved-modal-bg').classList.add('open');
}
function closeSavedModal() {
  document.getElementById('saved-modal-bg').classList.remove('open');
}
document.getElementById('saved-modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSavedModal();
});

function deleteSave(id) {
  putSaves(getSaves().filter(s => s.id !== id));
  renderSavedModal();
}

function renderSavedModal() {
  const saves = getSaves();
  const body = document.getElementById('saved-modal-body');
  if (saves.length === 0) {
    body.innerHTML = '<div class="no-saves">No saved rankings yet.<br>Complete a ranking and tap "Save Ranking" to store it here.</div>';
    return;
  }
  body.innerHTML = saves.map(s => `
    <div class="saved-entry">
      <div class="saved-entry-hdr">
        <div>
          <div class="saved-entry-name">${s.name}</div>
          <div class="saved-entry-date">${s.date}</div>
        </div>
        <button class="saved-entry-del" onclick="deleteSave(${s.id})" title="Delete">&#215;</button>
      </div>
      <div class="saved-entry-list">
        ${s.items.map(item => `
          <div class="saved-item-row">
            <div class="saved-item-num ${item.rank <= 10 ? 'g' : ''}">${item.rank}</div>
            ${item.emoji ? `<span style="font-size:15px">${item.emoji}</span>` : ''}
            <div class="saved-item-name">${item.name}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}
