<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TierGoat — Best Rappers 21st Century</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.22);--tx:#efefef;--mu:#5a5a5a;--mu2:#888;--ac:#c084fc;--red:#e85a4a;--green:#4acd8d;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;}
.app{min-height:100vh;}
.hdr{padding:16px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--ac);}
.hdr-back{font-size:11px;color:var(--mu);text-decoration:none;opacity:.7;}
.hdr-back:hover{opacity:1;color:var(--tx);}
.main{max-width:560px;margin:0 auto;width:100%;padding:28px 20px 48px;}
.screen{display:none;flex-direction:column;}.screen.active{display:flex;flex-direction:column;justify-content:flex-start;}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:.95;letter-spacing:3px;margin-bottom:10px;}
.h-title em{color:var(--ac);font-style:normal;}
.h-desc{font-size:13px;color:var(--mu2);line-height:1.75;margin-bottom:10px;max-width:400px;}
.h-meta{font-size:12px;color:var(--mu);margin-bottom:28px;}.h-meta span{color:var(--ac);}
.q-lbl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--ac);margin-bottom:2px;}
.pbar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;margin-bottom:16px;}
.pfill{height:100%;background:var(--ac);border-radius:1px;transition:width .22s;}
.q-hint{font-size:12px;color:var(--mu2);margin-bottom:16px;min-height:30px;line-height:1.55;}
.vs{display:flex;gap:8px;margin-bottom:10px;}
.vc-wrap{flex:1;display:flex;flex-direction:column;gap:6px;}
.vc{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s,transform .1s;position:relative;overflow:hidden;}
.vc::after{content:'';position:absolute;inset:0;background:var(--ac);opacity:0;transition:opacity .12s;}
.vc:hover{border-color:var(--ac);background:var(--s2);}.vc:hover::after{opacity:.04;}.vc:active{transform:scale(.97);}
.vc-emoji{font-size:30px;margin-bottom:6px;line-height:1.2;}
.vc-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;color:var(--tx);margin-bottom:3px;}
.vc-detail{font-size:11px;color:var(--mu);}
.vs-sep{display:flex;align-items:center;justify-content:center;width:24px;flex-shrink:0;font-size:11px;color:var(--mu);font-weight:500;}
.hwb{width:100%;padding:6px 8px;background:transparent;border:1px solid var(--b1);border-radius:6px;color:var(--mu);font-size:10px;letter-spacing:.04em;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .12s,border-color .12s;}
.hwb:hover{color:var(--tx);border-color:var(--b2);}
.btn-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.cmp-btn{background:var(--s2);border:1px solid var(--b2);color:var(--mu2);border-radius:6px;padding:5px 11px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.cmp-btn:hover{color:var(--tx);border-color:var(--b3);}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--ac);margin-bottom:4px;}
.res-meta{font-size:12px;color:var(--mu);margin-bottom:20px;}
.r-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--b1);}.r-row:last-child{border-bottom:none;}
.r-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--mu);min-width:34px;text-align:right;line-height:1;}.r-num.gold{color:var(--ac);}
.r-emoji{font-size:20px;min-width:28px;text-align:center;}.r-name{font-size:14px;color:var(--tx);flex:1;}.r-detail{font-size:11px;color:var(--mu);}
.btn{padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s;font-family:'DM Sans',sans-serif;}.btn:active{transform:scale(.98);}
.btn-p{background:var(--ac);color:#000;}.btn-p:hover{opacity:.88;}
.btn-g{background:transparent;color:var(--mu2);border:1px solid var(--b2);}.btn-g:hover{color:var(--tx);background:var(--s2);}
.btn-sm{padding:7px 14px;font-size:11px;}.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.save-btn{background:var(--s2);border:1px solid var(--b2);color:var(--ac);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}.save-btn:hover{background:var(--s3);}
.save-name-row{display:flex;gap:8px;margin-bottom:10px;}
.save-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;}.save-input:focus{border-color:var(--ac);}.save-input::placeholder{color:var(--mu);}
.saved-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:16px;}.saved-modal-bg.open{display:flex;}
.saved-modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:500px;max-height:88vh;display:flex;flex-direction:column;}
.saved-modal-hdr{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.saved-modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--ac);}
.saved-modal-close{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1;}.saved-modal-close:hover{color:var(--tx);}
.saved-modal-body{overflow-y:auto;padding:14px 18px;flex:1;}
.saved-entry{border:1px solid var(--b1);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.saved-entry-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--s2);}
.saved-entry-name{font-size:13px;font-weight:500;color:var(--tx);}.saved-entry-date{font-size:11px;color:var(--mu);}
.saved-entry-del{background:none;border:none;color:var(--mu);font-size:16px;cursor:pointer;padding:2px 6px;}.saved-entry-del:hover{color:var(--red);}
.saved-entry-list{padding:10px 14px;}
.saved-item-row{display:flex;gap:8px;align-items:center;padding:4px 0;font-size:12px;border-bottom:.5px solid var(--b1);}.saved-item-row:last-child{border-bottom:none;}
.saved-item-num{font-family:'Bebas Neue',sans-serif;font-size:16px;min-width:24px;text-align:right;color:var(--mu);}.saved-item-num.g{color:var(--ac);}
.saved-item-name{flex:1;color:var(--tx);}.no-saves{color:var(--mu);font-size:13px;text-align:center;padding:24px 0;}
.man-list{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.man-item{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;cursor:grab;user-select:none;touch-action:none;}
.man-item:active{cursor:grabbing;}
.man-item.dragging{opacity:.4;border-style:dashed;}
.man-item.drag-over{border-color:var(--ac);background:var(--s2);}
.man-rank{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--mu);min-width:24px;text-align:right;line-height:1;}
.man-rank.gold{color:var(--ac);}
.man-emoji{font-size:17px;min-width:22px;text-align:center;}
.man-name{font-size:12px;color:var(--tx);flex:1;}
.man-handle{font-size:13px;color:var(--mu);padding:0 2px;opacity:.4;}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <a href="index.html" class="logo-wrap">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <ellipse cx="14" cy="17" rx="5.5" ry="4.5" fill="#c084fc"/>
      <ellipse cx="14" cy="10.5" rx="4" ry="3.5" fill="#c084fc"/>
      <path d="M11 8 Q9.5 4.5 8 5.5" stroke="#c084fc" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M17 8 Q18.5 4.5 20 5.5" stroke="#c084fc" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <ellipse cx="10.5" cy="9.5" rx="1.2" ry="1.8" fill="#c084fc" transform="rotate(-20 10.5 9.5)"/>
      <ellipse cx="17.5" cy="9.5" rx="1.2" ry="1.8" fill="#c084fc" transform="rotate(20 17.5 9.5)"/>
      <rect x="10" y="20.5" width="2" height="4.5" rx="1" fill="#c084fc"/>
      <rect x="16" y="20.5" width="2" height="4.5" rx="1" fill="#c084fc"/>
      <circle cx="12.5" cy="10" r="0.8" fill="#0a0a0a"/>
      <circle cx="15.5" cy="10" r="0.8" fill="#0a0a0a"/>
    </svg>
    <span class="logo">TierGoat</span>
  </a>
  <a href="index.html" class="hdr-back">&#8592; All Rankers</a>
</div>
<div class="main">

<div class="screen active" id="s-home">
  <div class="h-title">Rank the<br><em>Greatest</em><br>Rappers</div>
  <p class="h-desc">The defining MCs of the 21st century. Who is the GOAT of the mic?</p>
  <p class="h-meta"><span>40 rappers</span></p>
  <div class="btn-row"><button class="btn btn-p" onclick="startQuiz()">Head-to-Head</button></div>
  <div class="btn-row" style="margin-top:8px"><button class="save-btn" style="border-color:var(--ac);color:var(--ac);opacity:.85" onclick="startManual()">Manually Rank</button></div>
  <div class="btn-row" style="margin-top:10px"><button class="save-btn" onclick="openSavedModal()">View Saved Rankings</button></div>
</div>

<div class="screen" id="s-quiz">
  <div class="q-lbl">21st Century Rappers</div>
  <div class="pbar"><div class="pfill" id="qpf" style="width:0%"></div></div>
  <div class="q-hint" id="qhint"></div>
  <div class="vs">
    <div class="vc-wrap">
      <div class="vc" onclick="pick('hi')">
        <div class="vc-emoji" id="vea">—</div>
        <div class="vc-name" id="vna">—</div>
        <div class="vc-detail" id="vda">—</div>
      </div>
      <button class="hwb" onclick="skipItem('a')">Haven't Listened &#8594;</button>
    </div>
    <div class="vs-sep">vs</div>
    <div class="vc-wrap">
      <div class="vc" onclick="pick('lo')">
        <div class="vc-emoji" id="veb">—</div>
        <div class="vc-name" id="vnb">—</div>
        <div class="vc-detail" id="vdb">—</div>
      </div>
      <button class="hwb" onclick="skipItem('b')">Haven't Listened &#8594;</button>
    </div>
  </div>
  <div class="btn-actions">
    <button class="cmp-btn" id="undo-btn" style="display:none" onclick="undoPick()">&#8592; Undo</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-g btn-sm" onclick="showPartial()">See ranking so far</button>
    <button class="btn btn-g btn-sm" onclick="startManual()">Manually Rank</button>
  </div>
</div>

<div class="screen" id="s-res">
  <div class="res-title">Your Ranking</div>
  <div class="res-meta" id="res-meta"></div>
  <div id="res-list"></div>
  <div class="save-name-row" style="margin-top:20px">
    <input class="save-input" id="save-name-input" placeholder="Name this ranking&#8230;" maxlength="40">
    <button class="save-btn" id="save-ranking-btn" onclick="saveRanking()">Save Ranking</button>
  </div>
  <div class="btn-row" style="margin-top:8px">
    <button class="btn btn-p" onclick="startQuiz()">Start Over</button>
    <button class="btn btn-g" id="continue-btn" style="display:none" onclick="continueQuiz()">Keep going</button>
  </div>
</div>

<div class="screen" id="s-manual">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span class="q-lbl" style="font-size:22px">Manual Ranking</span><span style="font-size:11px;color:var(--mu)">Drag to reorder</span></div>
  <div class="man-list" id="man-list"></div>
  <div class="save-name-row">
    <input class="save-input" id="man-save-input" placeholder="Name this ranking&#8230;" maxlength="40">
    <button class="save-btn" id="man-save-btn" onclick="saveManual()">Save Ranking</button>
  </div>
  <div class="btn-row" style="margin-top:8px">
    <button class="btn btn-p" onclick="startManual()">Reset Order</button>
    <button class="btn btn-g" onclick="show('s-home')">Back</button>
  </div>
</div>

</div>
</div>

<script>
const ITEMS = [
{n:'Kendrick Lamar',e:'🎤',d:'Compton'},
{n:'Jay-Z',e:'👑',d:'Brooklyn'},
{n:'Eminem',e:'🎙',d:'Detroit'},
{n:'Lil Wayne',e:'🐉',d:'New Orleans'},
{n:'Drake',e:'🦉',d:'Toronto'},
{n:'Kanye West',e:'🎹',d:'Chicago'},
{n:'J. Cole',e:'🌲',d:'Fayetteville'},
{n:'Nicki Minaj',e:'💎',d:'Queens'},
{n:'Cardi B',e:'💳',d:'The Bronx'},
{n:'Nas',e:'🗽',d:'Queens'},
{n:'Andre 3000',e:'🌌',d:'Atlanta'},
{n:'Lil Uzi Vert',e:'👽',d:'Philadelphia'},
{n:'Travis Scott',e:'🌵',d:'Houston'},
{n:'Future',e:'🚀',d:'Atlanta'},
{n:'Chance the Rapper',e:'🎰',d:'Chicago'},
{n:'Childish Gambino',e:'🔥',d:'Stone Mountain'},
{n:'Tyler the Creator',e:'🌻',d:'Hawthorne'},
{n:'Migos',e:'3️⃣',d:'Gwinnett'},
{n:'Juice WRLD',e:'⭐',d:'Chicago'},
{n:'XXXTentacion',e:'❓',d:'Plantation'},
{n:'Meek Mill',e:'🦅',d:'Philadelphia'},
{n:'Big Sean',e:'🐝',d:'Detroit'},
{n:'Rick Ross',e:'🤵',d:'Miami'},
{n:'Wiz Khalifa',e:'💨',d:'Pittsburgh'},
{n:'Lil Baby',e:'👶',d:'Atlanta'},
{n:'Gunna',e:'🏹',d:'College Park'},
{n:'Playboi Carti',e:'🃏',d:'Atlanta'},
{n:'50 Cent',e:'💰',d:'Queens'},
{n:'T.I.',e:'🏙',d:'Atlanta'},
{n:'ASAP Rocky',e:'🌹',d:'Harlem'},
{n:'Pusha T',e:'❄️',d:'Virginia Beach'},
{n:'DMX',e:'🐕',d:'Yonkers'},
{n:'Young Thug',e:'🦋',d:'Atlanta'},
{n:'21 Savage',e:'🔪',d:'Atlanta'},
{n:'Kodak Black',e:'🦅',d:'Pompano Beach'},
{n:'NBA YoungBoy',e:'🏀',d:'Baton Rouge'},
{n:'Megan Thee Stallion',e:'🐴',d:'Houston'},
{n:'Mac Miller',e:'🎸',d:'Pittsburgh'},
{n:'Logic',e:'🌙',d:'Gaithersburg'},
{n:'MF DOOM',e:'🎭',d:'New York'}
];
const RANKER_KEY = 'rappers';
let sorted=[],queue=[],current=-1,lo=0,hi=0,qNum=0,moveHistory=[],unseen=[];

function mxQ(n){let t=0;for(let i=2;i<=n;i++)t+=Math.ceil(Math.log2(i));return t;}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function startQuiz(){
  const ix=ITEMS.map((_,i)=>i);shuf(ix);
  sorted=[ix[0]];queue=ix.slice(1);current=-1;qNum=0;moveHistory=[];unseen=[];
  document.getElementById('undo-btn').style.display='none';
  show('s-quiz');nextInsertion();
}
function nextInsertion(){
  if(queue.length===0){showResults(true);return;}
  current=queue.shift();lo=0;hi=sorted.length;ask();
}
function ask(){
  if(lo>=hi){sorted.splice(lo,0,current);nextInsertion();return;}
  const mid=Math.floor((lo+hi)/2),piv=sorted[mid];
  const ins=ITEMS[current],pv=ITEMS[piv];
  document.getElementById('vea').textContent=ins.e;
  document.getElementById('vna').textContent=ins.n;
  document.getElementById('vda').textContent=ins.d;
  document.getElementById('veb').textContent=pv.e;
  document.getElementById('vnb').textContent=pv.n;
  document.getElementById('vdb').textContent=pv.d;
  qNum++;
  const pct=Math.min(97,Math.round((qNum/mxQ(ITEMS.length))*100));
  document.getElementById('qhint').textContent='Who is the greater MC? ' + queue.length + ' still to place.';
  document.getElementById('qpf').style.width=pct+'%';
}
function pick(ch){
  moveHistory.push({sorted:[...sorted],queue:[...queue],current,lo,hi,qNum,unseen:[...unseen]});
  document.getElementById('undo-btn').style.display='';
  const mid=Math.floor((lo+hi)/2);
  if(ch==='hi')hi=mid;else lo=mid+1;
  ask();
}
function skipItem(side){
  moveHistory.push({sorted:[...sorted],queue:[...queue],current,lo,hi,qNum,unseen:[...unseen]});
  document.getElementById('undo-btn').style.display='';
  const mid=Math.floor((lo+hi)/2);
  if(side==='a'){
    unseen.push(current);current=-1;lo=0;hi=0;nextInsertion();
  } else {
    const pivotIdx=sorted.splice(mid,1)[0];
    unseen.push(pivotIdx);
    hi=Math.min(hi,sorted.length);lo=Math.min(lo,sorted.length);
    ask();
  }
}
function undoPick(){
  if(moveHistory.length===0)return;
  const h=moveHistory.pop();
  sorted=h.sorted;queue=h.queue;current=h.current;lo=h.lo;hi=h.hi;qNum=h.qNum;
  if(h.unseen)unseen=h.unseen;
  if(moveHistory.length===0)document.getElementById('undo-btn').style.display='none';
  show('s-quiz');ask();
}
function showPartial(){
  const partial=[...sorted,...(current>=0?[current]:[]),...queue];
  buildResults(partial,false);
  document.getElementById('continue-btn').style.display='';
  show('s-res');
}
function continueQuiz(){
  document.getElementById('continue-btn').style.display='none';
  show('s-quiz');ask();
}
function showResults(complete){
  buildResults(sorted,complete);
  if(!complete)document.getElementById('continue-btn').style.display='';
  show('s-res');
}
function buildResults(list,complete){
  const watched=list.filter(i=>!unseen.includes(i));
  const skippedNote=unseen.length?' '+unseen.length+' skipped.':'';
  document.getElementById('res-meta').textContent=complete
    ?(watched.length+' ranked.'+skippedNote)
    :('Partial — '+queue.length+' still to place.'+skippedNote);
  const el=document.getElementById('res-list');
  el.innerHTML='';
  watched.forEach(function(idx,rank){
    const item=ITEMS[idx];
    const row=document.createElement('div');
    row.className='r-row';
    const nc=rank<10?'r-num gold':'r-num';
    row.innerHTML='<div class="'+nc+'">'+(rank+1)+'</div><div class="r-emoji">'+item.e+'</div><div class="r-name">'+item.n+'</div><div class="r-detail">'+item.d+'</div>';
    el.appendChild(row);
  });
  if(unseen.length>0){
    const div=document.createElement('div');
    div.style.cssText='margin:20px 0 8px;padding-top:16px;border-top:1px solid var(--b1);';
    const label=document.createElement('div');
    label.style.cssText='font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);font-weight:500;margin-bottom:10px';
    label.textContent=`Haven't Listened`;
    div.appendChild(label);
    el.appendChild(div);
    unseen.forEach(function(idx){
      const item=ITEMS[idx];
      const row=document.createElement('div');
      row.className='r-row';
      row.innerHTML='<div class="r-num" style="color:var(--mu);font-size:16px">—</div><div class="r-emoji" style="opacity:.4">'+item.e+'</div><div class="r-name" style="color:var(--mu2)">'+item.n+'</div><div class="r-detail">'+item.d+'</div>';
      el.appendChild(row);
    });
  }
}
function getSaves(){try{return JSON.parse(localStorage.getItem('tg_saves_'+RANKER_KEY)||'[]');}catch(e){return[];}}
function putSaves(arr){localStorage.setItem('tg_saves_'+RANKER_KEY,JSON.stringify(arr));}
function saveRanking(){
  const name=document.getElementById('save-name-input').value.trim()||
    new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const rows=document.querySelectorAll('#res-list .r-row');
  const items=[];
  rows.forEach(function(row){
    const nameEl=row.querySelector('.r-name');
    const numEl=row.querySelector('.r-num');
    const emojiEl=row.querySelector('.r-emoji');
    if(nameEl&&numEl&&numEl.textContent.indexOf('—')===-1)
      items.push({rank:parseInt(numEl.textContent)||0,name:nameEl.textContent.trim(),emoji:emojiEl?emojiEl.textContent.trim():''});
  });
  if(items.length===0)return;
  const saves=getSaves();
  saves.unshift({id:Date.now(),name:name,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),items:items});
  putSaves(saves);
  document.getElementById('save-name-input').value='';
  const btn=document.getElementById('save-ranking-btn');
  btn.textContent='✓ Saved!';btn.style.color='var(--green)';
  setTimeout(function(){btn.textContent='Save Ranking';btn.style.color='';},1800);
}
function openSavedModal(){renderSavedModal();document.getElementById('saved-modal-bg').classList.add('open');}
function closeSavedModal(){document.getElementById('saved-modal-bg').classList.remove('open');}
document.getElementById('saved-modal-bg').addEventListener('click',function(e){if(e.target===e.currentTarget)closeSavedModal();});
function deleteSave(id){putSaves(getSaves().filter(function(s){return s.id!==id;}));renderSavedModal();}
function renderSavedModal(){
  const saves=getSaves();
  const body=document.getElementById('saved-modal-body');
  if(saves.length===0){body.innerHTML='<div class="no-saves">No saved rankings yet.</div>';return;}
  let html='';
  saves.forEach(function(s){
    html+='<div class="saved-entry"><div class="saved-entry-hdr"><div><div class="saved-entry-name">'+s.name+'</div><div class="saved-entry-date">'+s.date+'</div></div><button class="saved-entry-del" onclick="deleteSave('+s.id+')">&#215;</button></div><div class="saved-entry-list">';
    s.items.forEach(function(item){
      html+='<div class="saved-item-row"><div class="saved-item-num'+(item.rank<=10?' g':'')+'">'+item.rank+'</div>'+(item.emoji?'<span style="font-size:15px">'+item.emoji+'</span>':'')+'<div class="saved-item-name">'+item.name+'</div></div>';
    });
    html+='</div></div>';
  });
  body.innerHTML=html;
}


var manOrder=[];
var dragSrc=null;
function startManual(){
  manOrder=ITEMS.map(function(_,i){return i;});
  renderManual();
  show('s-manual');
}
function renderManual(){
  var el=document.getElementById('man-list');
  el.innerHTML='';
  manOrder.forEach(function(idx,rank){
    var item=ITEMS[idx];
    var row=document.createElement('div');
    row.className='man-item';
    row.draggable=true;
    row.dataset.idx=idx;
    var rankCls=rank<10?'man-rank gold':'man-rank';
    row.innerHTML='<div class="man-handle">&#8801;</div><div class="'+rankCls+'">'+(rank+1)+'</div><div class="man-emoji">'+item.e+'</div><div class="man-name">'+item.n+'</div>';
    row.addEventListener('dragstart',function(){dragSrc=this;this.classList.add('dragging');});
    row.addEventListener('dragend',function(){this.classList.remove('dragging');document.querySelectorAll('.man-item').forEach(function(r){r.classList.remove('drag-over');});});
    row.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag-over');});
    row.addEventListener('dragleave',function(){this.classList.remove('drag-over');});
    row.addEventListener('drop',function(e){
      e.preventDefault();this.classList.remove('drag-over');
      if(dragSrc===this)return;
      var fromIdx=manOrder.indexOf(parseInt(dragSrc.dataset.idx));
      var toIdx=manOrder.indexOf(parseInt(this.dataset.idx));
      manOrder.splice(toIdx,0,manOrder.splice(fromIdx,1)[0]);
      renderManual();
    });
    row.addEventListener('touchstart',function(e){dragSrc=this;this.classList.add('dragging');},{passive:true});
    row.addEventListener('touchmove',function(e){
      e.preventDefault();
      var touch=e.touches[0];
      var target=document.elementFromPoint(touch.clientX,touch.clientY);
      if(target){var item=target.closest('.man-item');if(item&&item!==dragSrc){document.querySelectorAll('.man-item').forEach(function(r){r.classList.remove('drag-over');});item.classList.add('drag-over');}}
    },{passive:false});
    row.addEventListener('touchend',function(e){
      this.classList.remove('dragging');
      var over=document.querySelector('.man-item.drag-over');
      if(over&&over!==dragSrc){
        var fromIdx=manOrder.indexOf(parseInt(dragSrc.dataset.idx));
        var toIdx=manOrder.indexOf(parseInt(over.dataset.idx));
        manOrder.splice(toIdx,0,manOrder.splice(fromIdx,1)[0]);
        over.classList.remove('drag-over');
        renderManual();
      }
      document.querySelectorAll('.man-item').forEach(function(r){r.classList.remove('drag-over');});
    });
    el.appendChild(row);
  });
}
function saveManual(){
  var name=document.getElementById('man-save-input').value.trim()||new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  var items=manOrder.map(function(idx,rank){return {rank:rank+1,name:ITEMS[idx].n,emoji:ITEMS[idx].e};});
  var saves=getSaves();
  saves.unshift({id:Date.now(),name:name,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),items:items});
  putSaves(saves);
  document.getElementById('man-save-input').value='';
  var btn=document.getElementById('man-save-btn');
  btn.textContent='Saved!';btn.style.color='var(--green)';
  setTimeout(function(){btn.textContent='Save Ranking';btn.style.color='';},1800);
}
</script>

<div class="saved-modal-bg" id="saved-modal-bg">
  <div class="saved-modal">
    <div class="saved-modal-hdr">
      <div class="saved-modal-title">Saved Rankings</div>
      <button class="saved-modal-close" onclick="closeSavedModal()">&#215;</button>
    </div>
    <div class="saved-modal-body" id="saved-modal-body"></div>
  </div>
</div>
</div>

</body>
</html>
